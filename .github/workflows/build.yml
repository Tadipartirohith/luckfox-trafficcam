name: Build & Publish Firmware

on:
  push:
    branches: [main]
    paths:
      - overlay/**
      - recorder/**
      - config/**
      - build/build_overlay.sh
      - flash/**
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    env:
      SDK_DIR: /root/trafficcam_build/luckfox-pico
      OUT_DIR: /tmp/firmware-out

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SDK is present
        run: |
          [ -d "$SDK_DIR" ] || { echo "ERROR: SDK not found at $SDK_DIR. Run build/setup_runner.sh first."; exit 1; }
          echo "SDK OK at $SDK_DIR"
          ls "$SDK_DIR/output/image/"

      - name: Build overlay firmware
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
        run: |
          chmod +x build/build_overlay.sh
          bash build/build_overlay.sh

      - name: Upload firmware + flash scripts to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET_FIRMWARE:    ${{ secrets.S3_BUCKET_FIRMWARE }}
        run: |
          chmod +x build/upload_s3.sh
          bash build/upload_s3.sh

      - name: Clean up build artifacts
        if: always()
        run: rm -rf "$OUT_DIR"

      - name: Summary
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "### Firmware Published" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** luckfox-trafficcam-${DATE}.img" >> $GITHUB_STEP_SUMMARY
          echo "**S3:** s3://${{ secrets.S3_BUCKET_FIRMWARE }}/${DATE}/" >> $GITHUB_STEP_SUMMARY
          echo "**Flash (Windows):** Download flash.ps1 from the S3 path and run as administrator" >> $GITHUB_STEP_SUMMARY
